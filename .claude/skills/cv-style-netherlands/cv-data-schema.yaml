# JSON Schema (in YAML) for cv-data.yaml — Netherlands Style
# Validates structured CV data produced by the cv-agent.
# Each style has its own complete schema. No inheritance.

type: object
required: [header, summary, skills, experience, education]
additionalProperties:
  type: array
  items:
    type: string

properties:
  header:
    type: object
    required: [name, email]
    additionalProperties: false
    properties:
      name:
        type: string
        description: Full name of the candidate
      titles:
        type: array
        items: { type: string }
        description: "Role titles, e.g. ['Analytics Engineer', 'Data Engineer']"
      location:
        type: string
        description: "City only — e.g. 'Amsterdam, Netherlands'. Never full street address per Dutch privacy norms."
      email:
        type: string
        format: email
      phone:
        type: string
      linkedin:
        type: string
        description: "LinkedIn URL — required in Dutch CVs; LinkedIn is the primary professional network in the Netherlands"
      github:
        type: string
      nationality:
        type: string
        description: "Nationality — standard in Dutch CVs and helpful for international applicants (e.g. 'Pakistani', 'German', 'EU citizen')"
      photo_path:
        type: string
        description: "Optional — include for traditional Dutch companies; omit for tech/international/startups. Path to professional headshot image."
      relocation:
        type: string
        description: "Relocation statement — e.g. 'Open to relocation to the Netherlands' or 'EU citizen, no work permit required'"

  summary:
    type: string
    description: "Professional summary (3-4 lines). Direct, factual tone — no over-selling per Dutch cultural norms. Implied first person."

  skills:
    type: array
    minItems: 1
    items:
      type: object
      required: [category, items]
      additionalProperties: false
      properties:
        category:
          type: string
          description: "Skill category — e.g. 'Programming & Scripting', 'Cloud & Infrastructure', 'Data & Analytics', 'DevOps & Tools', 'Databases', 'Core Competencies'"
        items:
          type: array
          minItems: 1
          items: { type: string }

  languages:
    type: array
    items:
      type: object
      required: [language, level]
      additionalProperties: false
      properties:
        language:
          type: string
        level:
          type: string
          description: "CEFR level is the Dutch standard — e.g. 'C1', 'B2', 'Native', 'C1 (IELTS 7.0)'"

  experience:
    type: array
    minItems: 1
    items:
      type: object
      required: [title, company, date_start, date_end, bullets]
      additionalProperties: false
      properties:
        title:
          type: string
        company:
          type: string
        hq:
          type: string
          description: "Company HQ location, e.g. 'Amsterdam, Netherlands'"
        location:
          type: string
          description: "Candidate's working location"
        work_model:
          type: string
          enum: ["", Remote, On-site, Hybrid]
        company_description:
          type: string
          description: "One-line context note for lesser-known companies — not standard in Dutch CVs but acceptable for obscure employers"
        date_start:
          type: string
          description: "Format: Mon YYYY (3-letter month, e.g. Sep 2024) — standard Dutch CV date format"
        date_end:
          type: string
          description: "Format: Mon YYYY (e.g. Mar 2024) or 'Present'"
        bullets:
          type: array
          minItems: 1
          items: { type: string }

  education:
    type: array
    minItems: 1
    items:
      type: object
      required: [degree, institution]
      additionalProperties: false
      properties:
        degree:
          type: string
          description: "Include degree level and field, e.g. 'BSc Computer Science (WO)' or 'MSc Data Science (HBO)'"
        institution:
          type: string
        location:
          type: string
        date_start:
          type: string
        date_end:
          type: string
        status:
          type: string
          description: "e.g. 'In Progress' — only if applicable"
        gpa:
          type: string
          description: "Include only if Dutch score 8.0+ (cum laude) or equivalent distinction — Dutch scale is 1–10"

  certifications:
    type: array
    items:
      type: object
      required: [name, issuer, date]
      additionalProperties: false
      properties:
        name:
          type: string
        issuer:
          type: string
        date:
          type: string
          description: "Month YYYY format, e.g. 'April 2026'"
        url:
          type: string
          format: uri
          description: "Verification URL — omit if not available"

  projects:
    type: array
    description: "Personal/side projects — valued in Dutch tech market. Only include if directly addressing a JD Signal List item."
    items:
      type: object
      required: [name, description, bullets]
      additionalProperties: false
      properties:
        name:
          type: string
        url:
          type: string
          description: "GitHub or live URL if available"
        description:
          type: string
          description: "One-line: what it is + tech stack"
        bullets:
          type: array
          minItems: 1
          maxItems: 2
          items: { type: string }

  interests:
    type: array
    description: "Brief interests list — Dutch employers value seeing the whole person; work-life balance is a core Dutch cultural value. Keep to 3–5 items."
    items:
      type: string

  volunteer_work:
    type: array
    description: "Volunteer work — valued in Dutch CVs, especially for junior candidates or career changers"
    items:
      type: object
      required: [role, organization]
      additionalProperties: false
      properties:
        role:
          type: string
        organization:
          type: string
        date_start:
          type: string
        date_end:
          type: string
        description:
          type: string
