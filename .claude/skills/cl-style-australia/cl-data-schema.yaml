# JSON Schema (in YAML) for cl-data.yaml — Australia Style
# Validates structured cover letter data produced by the cl-agent.
# Each style has its own complete schema. No inheritance.

type: object
required: [header, date, salutation, paragraphs, sign_off]
additionalProperties: false

properties:
  header:
    type: object
    required: [name, email]
    additionalProperties: false
    properties:
      name:
        type: string
      title:
        type: string
        description: "Candidate's current/target role title for the header"
      email:
        type: string
        format: email
      phone:
        type: string
      linkedin:
        type: string
      github:
        type: string
      relocation:
        type: string
        description: "Work rights or relocation statement — e.g. 'Australian Permanent Resident — full working rights' or 'Available to relocate to Melbourne'"

  date:
    type: string
    description: "Letter date in Australian format — 'D Month YYYY' e.g. '2 June 2026' (no ordinal suffix, no comma). Full block left-aligned layout."

  salutation:
    type: string
    description: "Use hiring manager's name if known: 'Dear [First Name Last Name],' or 'Dear [Last Name],' for formal sectors. Fallback: 'Dear Hiring Manager,' — preferred over 'To Whom It May Concern' (outdated) or 'Dear Sir/Madam' (gender-specific)."

  paragraphs:
    type: array
    items: { type: string }
    minItems: 3
    maxItems: 5
    description: "Body paragraphs — 3 to 5 paragraphs, 300–450 words total. Standard structure: (1) opening hook, (2) skills/achievements fit, (3) company alignment, (4) close. Australian private sector only — not KSC/selection criteria format."

  sign_off:
    type: object
    required: [closing, name]
    additionalProperties: false
    properties:
      closing:
        type: string
        description: "Australian standard: 'Kind regards,' (most recommended). Alternatives: 'Regards,', 'Warm regards,' (less formal/tech), 'Sincerely,' (formal/finance)."
      name:
        type: string
      title:
        type: string
      email:
        type: string
      phone:
        type: string
