# Cover Letter Format Configuration — Australia Style
# Controls all visual/layout aspects of the rendered cover letter.
# Each style has its own complete format config. No inheritance.
# Designed to visually match the CV (same header, fonts, colors).

page:
  size: A4  # Must match CV — A4 is the universal standard in Australia
  margins:
    top: 2.0  # cm — Must match CV. Suggested range: 2.0–2.5cm. Australian standard
    bottom: 2.0  # cm — Must match CV. Suggested range: 2.0–2.5cm
    left: 2.0  # cm — Must match CV. Suggested range: 2.0–2.5cm
    right: 2.0  # cm — Must match CV. Suggested range: 1.5–2.0cm

header:
  name_font_size: 18  # pt — Must match CV name_font_size. Suggested range: 16–20pt
  name_color: "#003366"  # Must match CV primary color: "#003366" (navy). Alternatives: "#1F3864" (dark navy), "#2C3E50" (charcoal), "#000000" (black for conservative sectors)
  name_case: upper  # Must match CV name_case. Options: upper, title, as-is
  name_bold: true  # Must match CV name_bold
  show_title: true  # Must match CV show_titles. Options: true, false
  title_font_size: 10  # pt — Must match CV titles_font_size. Suggested range: 9–11pt
  contact_font_size: 10  # pt — Must match CV contact_font_size. Suggested range: 9–10pt
  links_font_size: 10  # pt — Must match CV links_font_size. Suggested range: 9–10pt
  show_relocation: true  # Must match CV show_relocation. Include work rights or relocation note when relevant
  relocation_font_size: 10  # pt — Must match CV relocation_font_size. Suggested range: 9–10pt
  relocation_bold: true  # Must match CV relocation_bold

date:
  alignment: left  # Australian business letter format: all elements left-aligned (full block layout). Options: left, right. Format: "2 June 2026" (day month year, no ordinal)

body:
  paragraph_spacing_after: 120  # twips — Suggested range: 100–160 twips (≈5–8pt). 120 twips provides clean separation between paragraphs; consistent with professional Australian business letter norms

# Sign-off — Australian standard closing phrases
# "Kind regards," is the most commonly recommended across Hays, Michael Page, and SEEK Australia
sign_off:
  closing_text: "Kind regards,"  # Australian standard sign-offs: "Kind regards," (most popular), "Regards," (also common), "Warm regards," (less formal — tech/startup), "Sincerely," (formal — finance/law)
  name_bold: true
  name_color: "#003366"  # Must match CV primary color

typography:
  heading_font: Calibri  # Must match CV heading_font. Popular in Australia: Calibri, Arial, Garamond, Georgia, Cambria
  body_font: Calibri  # Must match CV body_font
  body_size: 11  # pt — Must match CV body_size. Suggested range: 10–12pt. 11pt is the Australian professional standard
  line_spacing: 1.0  # Must match CV line_spacing. Single spacing is the Australian standard for cover letters

colors:
  primary: "#003366"  # Must match CV primary color. Navy is most professional in the Australian market
  body: "#000000"
  link: "#003366"

# Validation limits for validate_output.py
validation:
  min_paragraphs: 3  # Minimum 3 paragraphs — private sector minimum is 3 (hook, fit, company) plus closing
  max_paragraphs: 5  # Maximum 5 paragraphs — 4 is standard; 5 for experienced professionals with more to cover
  min_total_words: 300  # Minimum 300 words — Hays Australia and Michael Page recommend 300–400 words for private sector
  max_total_words: 450  # Maximum 450 words — strictly one page. Government KSC documents are different (not this style)
