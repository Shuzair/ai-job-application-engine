# Cover Letter Format Configuration — Saudi Arabia Style
# Controls all visual/layout aspects of the rendered cover letter.
# Each style has its own complete format config. No inheritance.
# Designed to visually match the CV (same header, fonts, colors).

page:
  size: A4  # A4 (210×297mm) — must match CV. Universal in Saudi Arabia; Letter format is not used.
  margins:
    top: 2.0  # cm — Suggested range: 2.0–2.5cm. Must match CV top margin
    bottom: 2.0  # cm — Suggested range: 2.0–2.5cm. Must match CV
    left: 2.0  # cm — Suggested range: 2.0–2.5cm. Must match CV
    right: 2.0  # cm — Suggested range: 1.5–2.0cm. Must match CV

header:
  name_font_size: 18  # pt — Must match CV name_font_size. Suggested range: 16–22pt
  name_color: "#1F3864"  # Must match CV primary color for visual consistency. Options: "#1F3864" (dark navy), "#006C35" (Saudi green), "#2C3E50" (charcoal), "#000000" (black)
  name_case: upper  # Must match CV name_case. Options: upper, title, as-is
  name_bold: true  # Must match CV name_bold
  show_title: true  # Show role title — must match CV show_titles. Options: true, false
  title_font_size: 10  # pt — Must match CV titles_font_size. Suggested range: 9–11pt
  contact_font_size: 10  # pt — Must match CV contact_font_size. Suggested range: 9–10pt
  links_font_size: 10  # pt — Must match CV links_font_size. Suggested range: 9–10pt
  show_relocation: true  # Must match CV show_relocation. Iqama/visa status is as important on CL as on CV
  relocation_font_size: 10  # pt — Must match CV relocation_font_size
  relocation_bold: true  # Must match CV relocation_bold

date:
  alignment: left  # Options: left, right. English business letters use left alignment. Arabic cover letters use right alignment (RTL). For English submissions: left.

body:
  paragraph_spacing_after: 120  # twips — Suggested range: 100–160 twips (≈5–8pt). 120 twips provides clear paragraph separation; Arabic formal letters prefer more generous spacing (140–160 twips)

# SIGN-OFF — Saudi Arabia business letter closings
# English (in descending formality):
#   "Yours faithfully," — most formal; use when you do not know the recipient's name
#   "Yours sincerely," — formal; use when you know the recipient's name
#   "Kind regards," — professional, slightly less formal
# Arabic formal closings:
#   "تفضلوا بقبول فائق الاحترام والتقدير" — standard formal (Please accept my utmost respect and appreciation)
#   "مع خالص التحية والتقدير" — slightly less formal (With sincere greetings and appreciation)
sign_off:
  closing_text: "Yours sincerely,"  # English formal standard for Saudi Arabia. Use "Yours faithfully," when recipient is unknown. For Arabic letters, use "تفضلوا بقبول فائق الاحترام والتقدير"
  name_bold: true
  name_color: "#1F3864"  # Must match CV primary color for visual consistency

typography:
  heading_font: Arial  # Must match CV heading_font. Popular: Arial (most ATS-safe), Calibri, Times New Roman, Helvetica
  body_font: Arial  # Must match CV body_font
  body_size: 11  # pt — Must match CV body_size. Suggested range: 10–12pt. 11pt is the Saudi norm (per jobera.com guide: use same font and size as CV)
  line_spacing: 1.15  # Must match CV line_spacing. Suggested range: 1.0–1.15

colors:
  primary: "#1F3864"  # Must match CV primary color for visual consistency. Options: "#1F3864" (dark navy), "#006C35" (Saudi green), "#2E74B5" (steel blue), "#2C3E50" (charcoal)
  body: "#000000"
  link: "#1F3864"

# Validation limits for validate_output.py
validation:
  min_paragraphs: 3  # Suggested range: 3–4. Saudi cover letters follow 3–4 paragraph structure (per jobera.com Saudi cover letter guide). 3 minimum ensures Opening + Value + Close
  max_paragraphs: 4  # Suggested range: 4–5. 4 paragraphs is standard for Saudi Arabia; optional achievement paragraph brings it to 4
  min_total_words: 200  # Suggested range: 180–250. Saudi cover letters are one typed A4 page; 200 words is a practical floor for 3–4 paragraphs
  max_total_words: 350  # Suggested range: 300–400. One page limit — 350 words fits comfortably on A4 at 11pt with 3–4 paragraphs. Note: cover letters are largely optional in Saudi Arabia (only 9% of applicants include them proactively per Michael Page Saudi Arabia survey) — a concise, well-written letter differentiates significantly
