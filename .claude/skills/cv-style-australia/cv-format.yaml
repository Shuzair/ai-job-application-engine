# CV Format Configuration — Australia Style
# Controls all visual/layout aspects of the rendered CV document.
# Each style has its own complete format config. No inheritance.
# The rendering script (scripts/render.py) reads this file deterministically.

page:
  size: A4  # A4 is the universal standard in Australia (21×297mm). Never use Letter format.
  margins:
    top: 2.0  # cm — Suggested range: 2.0–2.5cm. SEEK and Hays Australia recommend 2.0–2.5cm
    bottom: 2.0  # cm — Suggested range: 2.0–2.5cm. Matches top margin
    left: 2.0  # cm — Suggested range: 2.0–2.5cm. Standard Australian business document margin
    right: 2.0  # cm — Suggested range: 1.5–2.0cm. Can be slightly smaller than left

header:
  name_font_size: 18  # pt — Suggested range: 16–20pt. Bold large name anchors the page; 18pt is well-proportioned
  name_color: "#003366"  # Popular Australian professional colors: "#003366" (navy, most popular), "#1F3864" (dark navy), "#2C3E50" (charcoal), "#2E6B5E" (dark teal), "#000000" (black for finance/law/government)
  name_case: upper  # Options: upper, title, as-is. Uppercase names are common and professional in Australia
  name_bold: true  # Options: true, false. Bold is standard across all sources
  show_titles: true  # Options: true, false. A professional headline below the name is widely used in Australia
  titles_font_size: 10  # pt — Suggested range: 9–11pt. Secondary text below name
  contact_font_size: 10  # pt — Suggested range: 9–10pt. Standard secondary text
  links_font_size: 10  # pt — Suggested range: 9–10pt. LinkedIn URL, GitHub — same size as contact info
  show_relocation: true  # Options: true, false. SEEK Australia explicitly advises interstate/international applicants to note relocation intent
  relocation_font_size: 10  # pt — Suggested range: 9–10pt. Matches contact/links size
  relocation_bold: true  # Options: true, false. Bold draws attention to work rights or relocation availability

# Sections — Australian standard CV structure.
# Referees and volunteer_work are distinctively Australian inclusions.
# Languages is placed last as Australia is monolingual; only include when role-relevant.
sections:
  order:
    - summary
    - skills
    - experience
    - education
    - certifications
    - volunteer_work
    - languages
    - referees
  headings:                   # Display names for section headings in the rendered document.
    summary: "Professional Summary"  # Also acceptable: "Career Summary", "Professional Profile"
    skills: "Skills"  # Also acceptable: "Key Skills", "Core Competencies"
    experience: "Professional Experience"  # Also acceptable: "Work Experience"
    education: "Education & Qualifications"  # Australian norm includes "& Qualifications"
    certifications: "Certifications & Licences"  # Include "& Licences" for trade/professional licences
    volunteer_work: "Volunteer Work"  # Also acceptable: "Community Involvement"
    languages: "Languages"
    referees: "Referees"  # Australian term — not "References" (which is US/UK usage)
  heading_case: upper  # Options: upper, title, as-is. Uppercase section headings are the dominant Australian standard
  heading_bold: true  # Options: true, false. True is standard
  heading_underline: true  # Options: true (horizontal rule below heading), false. Ruled headings are conventional in Australian CVs
  heading_size: 12  # pt — Suggested range: 11–14pt. Hays Australia templates use 12pt headings
  section_types:
    volunteer_work: list  # Each entry as a bullet; same visual treatment as experience entries
    referees: paragraph  # "Referees available upon request" as a single line, or list referee details

typography:
  heading_font: Calibri  # Popular Australian CV fonts: Calibri (most recommended), Arial, Garamond, Georgia, Cambria, Helvetica, Verdana. Calibri is the SEEK and Hays default recommendation
  body_font: Calibri  # Must match or pair well with heading_font. Calibri is standard
  body_size: 11  # pt — Suggested range: 10–12pt. 11pt is widely cited as optimal by SEEK, Hays, and UNSW career services
  line_spacing: 1.0  # Suggested range: 1.0–1.15. Single spacing within sections is the Australian standard; visual separation comes from whitespace between sections

skills:
  separator: " · "  # Options: " · " (middle dot), " | " (pipe), ", " (comma). Middle dot is the professional Australian standard

languages:
  separator: " · "  # Separator between language entries; matches skills separator

experience:
  show_company_description: true  # Options: true, false. Hays Australia specifically recommends brief company context for employers unknown to Australian recruiters (industry, size, what they do)
  max_bullets_per_role: 5  # Suggested range: 4–6. Australian CVs use 4–5 for recent roles; 2–3 for older roles (set in validation)

colors:
  primary: "#003366"  # Popular Australian professional colors: "#003366" (navy, most popular), "#1F3864" (dark navy), "#2C3E50" (charcoal), "#2E6B5E" (dark teal), "#800020" (burgundy). Finance, law, government: use "#000000" (black-only)
  body: "#000000"             # Body text — always black
  link: "#003366"             # Hyperlinks match primary color

# Validation limits for validate_output.py
validation:
  summary_min_words: 50  # Minimum 50 words — UNSW recommends 3–4 lines; Hays recommends 50–150 words
  summary_max_words: 100  # Maximum 100 words — concise and direct per Australian recruiter preference
  max_bullet_words: 20  # Australian standard: 1–2 lines per bullet, targeting 15 words. Max 20 for complex technical roles
  max_bullets_recent: 5  # Up to 5 bullets for current/recent roles (within 3 years)
  max_bullets_old: 3  # 2–3 bullets for older roles (3+ years ago)
  max_pages: 2  # 2 pages for private sector (SEEK, Hays consensus). Government roles may use 3–4 pages
