# JSON Schema (in YAML) for cv-data.yaml — Africa Style
# Validates structured CV data produced by the cv-agent.
# Each style has its own complete schema. No inheritance.
# Covers English-language African markets: South Africa, Nigeria, Kenya, Ghana, Rwanda, Ethiopia.

type: object
required: [header, summary, skills, experience, education]
additionalProperties:
  type: array
  items:
    type: string

properties:
  header:
    type: object
    required: [name, email]
    additionalProperties: false
    properties:
      name:
        type: string
        description: Full name of the candidate
      titles:
        type: array
        items: { type: string }
        description: "Role titles, e.g. ['Data Engineer', 'Analytics Engineer']"
      location:
        type: string
        description: "City and country only — e.g. 'Nairobi, Kenya' or 'Lagos, Nigeria'. No full street address."
      email:
        type: string
        format: email
      phone:
        type: string
      linkedin:
        type: string
      github:
        type: string
        description: "GitHub URL — include for software/data roles in tech-forward markets (Kenya, Nigeria fintech)"
      relocation:
        type: string
        description: "Relocation note for cross-border applications, e.g. 'Open to relocation to South Africa'"

  summary:
    type: string
    description: Professional summary (3-4 lines, 35-80 words). Implied first person — no 'I'. British English spelling.

  skills:
    type: array
    minItems: 1
    items:
      type: object
      required: [category, items]
      additionalProperties: false
      properties:
        category:
          type: string
          description: "Skill category — up to 5 buckets: 'Technical Skills', 'Cloud & Infrastructure', 'Data & Analytics', 'Professional Skills', 'Soft Skills'"
        items:
          type: array
          minItems: 1
          items: { type: string }

  languages:
    type: array
    items:
      type: object
      required: [language, level]
      additionalProperties: false
      properties:
        language:
          type: string
        level:
          type: string
          description: "Plain English descriptor — NOT CEFR. Use: Native, Fluent, Professional Working Proficiency, Conversational, Basic"

  experience:
    type: array
    minItems: 1
    items:
      type: object
      required: [title, company, date_start, date_end, bullets]
      additionalProperties: false
      properties:
        title:
          type: string
        company:
          type: string
        hq:
          type: string
          description: "Company HQ location, e.g. 'Johannesburg, South Africa'"
        location:
          type: string
          description: "Candidate's working location"
        work_model:
          type: string
          enum: ["", Remote, On-site, Hybrid]
        company_description:
          type: string
          description: "One-line factual company descriptor — important when employer may not be known across markets"
        date_start:
          type: string
          description: "Format: Mon YYYY (abbreviated month, e.g. Jan 2022)"
        date_end:
          type: string
          description: "Format: Mon YYYY (e.g. Mar 2024) or 'Present'"
        bullets:
          type: array
          minItems: 1
          items: { type: string }
          description: "Action-verb led, quantified bullets. British English spelling. No 'I' subject."

  education:
    type: array
    minItems: 1
    items:
      type: object
      required: [degree, institution]
      additionalProperties: false
      properties:
        degree:
          type: string
        institution:
          type: string
        location:
          type: string
        date_start:
          type: string
        date_end:
          type: string
        status:
          type: string
          description: "e.g. 'In Progress' — only if applicable"
        gpa:
          type: string
          description: "Include if strong — use institution's own grading term: 'First Class Honours', 'Cum Laude', 'Distinction', GPA on 4.0 scale. Omit if unremarkable."

  certifications:
    type: array
    items:
      type: object
      required: [name, issuer, date]
      additionalProperties: false
      properties:
        name:
          type: string
        issuer:
          type: string
        date:
          type: string
          description: "Year only or 'Month Year', e.g. '2023' or 'April 2023'"
        url:
          type: string
          format: uri
          description: "Verification URL — omit if not available"

  volunteer_work:
    type: array
    description: "Optional — particularly valued in Kenya, Rwanda (NGO sector) and South Africa. Include if relevant."
    items:
      type: object
      required: [role, organisation]
      additionalProperties: false
      properties:
        role:
          type: string
        organisation:
          type: string
        date_start:
          type: string
        date_end:
          type: string
        bullets:
          type: array
          items: { type: string }

  hobbies:
    type: array
    description: "Optional — include only if relevant to role or adds professional dimension. Common in traditional Nigerian, Ghanaian, Kenyan formats."
    items:
      type: string

  referees:
    type: array
    description: "African-English term is 'Referees', not 'References'. Default: omit and use 'Referees available on request' in the document. List full details only for government/NGO/senior roles that require them."
    items:
      type: object
      required: [name, title, organisation]
      additionalProperties: false
      properties:
        name:
          type: string
        title:
          type: string
          description: "Referee's professional title"
        organisation:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
