# JSON Schema (in YAML) for cv-data.yaml — Denmark Style
# Validates structured CV data produced by the cv-agent.
# Each style has its own complete schema. No inheritance.

type: object
required: [header, summary, skills, experience, education]
additionalProperties:
  type: array
  items:
    type: string

properties:
  header:
    type: object
    required: [name, email]
    additionalProperties: false
    properties:
      name:
        type: string
        description: Full name of the candidate
      titles:
        type: array
        items: { type: string }
        description: "Role titles, e.g. ['Analytics Engineer', 'Data Engineer']"
      location:
        type: string
        description: Current city and country
      email:
        type: string
        format: email
      phone:
        type: string
      linkedin:
        type: string
        description: LinkedIn profile URL — required for Danish applications (70% of large Danish companies check it)
      github:
        type: string
      photo_path:
        type: string
        description: "Path to professional headshot — culturally expected in Denmark. E.g. 'candidatepi.jpg'"
      relocation:
        type: string
        description: "Relocation statement — required for international candidates. E.g. 'Open to immediate relocation to Denmark'"

  summary:
    type: string
    description: Professional summary paragraph (3-5 lines). Tone must reflect Danish norms — factual, collaborative, no superlatives. Janteloven-compliant.

  skills:
    type: array
    minItems: 1
    items:
      type: object
      required: [category, items]
      additionalProperties: false
      properties:
        category:
          type: string
          description: "Skill category name. Danish buckets: 'Programming & Languages', 'Cloud & Infrastructure', 'Data Engineering & Analytics', 'Tools & Methods'"
        items:
          type: array
          minItems: 1
          items: { type: string }

  languages:
    type: array
    items:
      type: object
      required: [language, level]
      additionalProperties: false
      properties:
        language:
          type: string
        level:
          type: string
          description: "CEFR level (A1–C2) — explicit standard in Denmark. E.g. 'C1 (IELTS 7.5)' or 'C2 (Native)' or 'A1 (Beginner, actively learning)'"

  experience:
    type: array
    minItems: 1
    items:
      type: object
      required: [title, company, date_start, date_end, bullets]
      additionalProperties: false
      properties:
        title:
          type: string
        company:
          type: string
        hq:
          type: string
          description: "Company HQ location, e.g. 'San Francisco, USA'"
        location:
          type: string
          description: "Candidate's working location"
        work_model:
          type: string
          enum: ["", Remote, On-site, Hybrid]
        company_description:
          type: string
          description: "One-line factual company descriptor — include for non-Danish or unfamiliar companies to help Danish employers contextualize the role"
        date_start:
          type: string
          description: "Format: Mon YYYY (3-letter month, e.g. Jan 2022)"
        date_end:
          type: string
          description: "Format: Mon YYYY (3-letter month, e.g. Mar 2024) or 'Present'"
        bullets:
          type: array
          minItems: 1
          items: { type: string }

  education:
    type: array
    minItems: 1
    items:
      type: object
      required: [degree, institution]
      additionalProperties: false
      properties:
        degree:
          type: string
        institution:
          type: string
        location:
          type: string
        date_start:
          type: string
        date_end:
          type: string
        status:
          type: string
          description: "e.g. 'In Progress' — only if applicable"
        gpa:
          type: string
          description: "Include only if strong (Danish equivalent 10–12; ECTS A or B). For Danish institutions: 'GPA: 10/12 (ECTS: B)'. For others: 'GPA: 3.7/4.0'"
        thesis:
          type: string
          description: "Thesis title — include if directly relevant to the target role. E.g. 'Thesis: Real-Time Data Pipeline Architectures for IoT Applications'"

  certifications:
    type: array
    items:
      type: object
      required: [name, issuer, date]
      additionalProperties: false
      properties:
        name:
          type: string
        issuer:
          type: string
        date:
          type: string
          description: "Month and year, e.g. 'April 2026'"
        url:
          type: string
          format: uri
          description: "Verification URL — omit if not available"

  interests:
    type: array
    items:
      type: string
    description: "2–4 interests/hobbies. Culturally valued in Denmark — flat-hierarchy culture means employers care about the whole person. Keep specific and factual, avoid generic filler."

  references:
    type: array
    items:
      type: string
    description: "Reference entries or single 'References available upon request' (Anbefalinger kan fås ved nærmere henvendelse). Include actual references only if explicitly requested or if the candidate has strong ones to offer."
