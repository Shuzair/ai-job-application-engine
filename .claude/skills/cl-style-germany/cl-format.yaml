# Cover Letter Format Configuration — Germany Style
# Controls all visual/layout aspects of the rendered cover letter (Anschreiben).
# Each style has its own complete format config. No inheritance.
# Designed to visually match the CV (same header, fonts, colors).
# References: DIN 5008 (2020 revision), Bundesagentur für Arbeit, expatrio.com, settle-in-berlin.com

page:
  size: A4  # Must match CV — A4 exclusively in Germany. Options: A4, Letter
  margins:
    top: 1.5  # cm — Must match CV top margin. Per DIN 5008 Form A. Suggested range: 2.0–2.7cm
    bottom: 1.5  # cm — Must match CV. Suggested range: 1.5–2.0cm
    left: 1.5 # cm — Must match CV. Per DIN 5008 (25mm). Suggested range: 2.0–2.5cm
    right: 1.5  # cm — Must match CV. Per DIN 5008 (20mm). Suggested range: 1.5–2.0cm

header:
  name_font_size: 16  # pt — Must match CV name_font_size. Suggested range: 18–24pt
  name_color: "#003366"  # Must match CV primary color. Navy blue — German conservative preference
  name_case: upper  # Must match CV name_case. Options: upper, title, as-is
  name_bold: true  # Must match CV name_bold. Options: true, false
  show_title: true  # Must match CV show_titles. Options: true, false
  title_font_size: 9  # pt — Must match CV titles_font_size. Suggested range: 9–11pt
  contact_font_size: 9  # pt — Must match CV contact_font_size. Suggested range: 9–10pt
  links_font_size: 9  # pt — Must match CV links_font_size. Suggested range: 9–10pt
  show_relocation: false  # Must match CV show_relocation. Options: true, false
  relocation_font_size: 9  # pt — Must match CV relocation_font_size. Suggested range: 9–10pt
  relocation_bold: true  # Must match CV relocation_bold. Options: true, false

date:
  alignment: right  # Per DIN 5008: date in Infoblock, right-aligned. Options: left, right. Format: "City, DD.MM.YYYY" or "City, D. Month YYYY"

body:
  paragraph_spacing_after: 120  # twips — Per DIN 5008: 1 blank line between paragraphs. Suggested range: 120–160 twips (≈6–8pt). German business letters use clear paragraph separation

# Sign-off — German business letter convention per DIN 5008
# "Mit freundlichen Grüßen" is the universal standard formal closing.
# Note: NO comma after the sign-off phrase in German convention (unlike salutation).
sign_off:
  closing_text: "Kind regards,"  # For English-language letters. German alternative: "Mit freundlichen Grüßen" (no comma — per DIN 5008). Other German options: "Hochachtungsvoll" (very formal, archaic), "Herzliche Grüße" (informal, only for established relationships)
  name_bold: true  # Standard in German business correspondence
  name_color: "#003366"  # Matches CV primary color for visual consistency

typography:
  heading_font: Calibri  # Must match CV heading_font. Popular in Germany: Calibri, Arial, Helvetica, Roboto
  body_font: Calibri  # Must match CV body_font. Popular: Calibri, Arial, Helvetica
  body_size: 11  # pt — Must match CV body_size. German standard: 11pt. Suggested range: 10–12pt. Never below 11pt in Anschreiben
  line_spacing: 1.0  # Must match CV line_spacing. Suggested range: 1.0–1.15. DIN 5008 recommends 1.0 but 1.15 improves readability

colors:
  primary: "#003366"  # Must match CV primary color. Navy blue — conservative German market preference
  body: "#000000"  # Black body text — universal standard
  link: "#003366"  # Matches primary for visual consistency

# Validation limits for validate_output.py
validation:
  min_paragraphs: 3  # German Anschreiben: 3–4 body paragraphs standard. Suggested range: 3–4
  max_paragraphs: 4  # Upper limit: 4 paragraphs. 5 is the absolute max before it feels padded
  min_total_words: 200  # German Anschreiben body: 150–250 words typical. Accounting for total (incl. salutation/sign-off): 200 min
  max_total_words: 350  # Strictly one A4 page. Suggested range: 300–400 total. Keep concise and evidence-based
