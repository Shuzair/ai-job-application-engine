# Cover Letter Format Configuration — Germany Style (Anschreiben)
# Controls all visual/layout aspects of the rendered cover letter.
# Each style has its own complete format config. No inheritance.
# Designed to visually match the CV (same header, fonts, colors).
# DIN 5008 conventions apply: block format, left-aligned, no paragraph indentation.

page:
  size: A4  # Must match CV. A4 is the universal standard in Germany. Never US Letter. Per Tier 1 (DIN 5008)
  margins:
    top: 2.0  # cm — Suggested range: 2.0–2.5cm. Must match CV top margin. DIN 5008 minimum: 16.9mm
    bottom: 2.0  # cm — Suggested range: 2.0–2.5cm. Must match CV
    left: 2.5  # cm — Suggested range: 2.0–2.5cm. Must match CV. DIN 5008 specifies 24.1mm for Anschreiben — binding for formal letters
    right: 2.0  # cm — Suggested range: 1.5–2.0cm. Must match CV. DIN 5008 minimum 8.1mm; 2.0cm recommended for legibility

header:
  name_font_size: 18  # pt — Must match CV name_font_size. Suggested range: 16–20pt. 18pt is the German standard
  name_color: "#2E4057"  # Must match CV primary color for visual consistency. Suggested: "#2E4057" (muted slate), "#003366" (navy), "#000000" (black for finance/law)
  name_case: upper  # Must match CV name_case. Options: upper, title, as-is. Uppercase is the German CV convention
  name_bold: true  # Must match CV name_bold. true is universal in German applications
  show_title: true  # Must match CV show_titles. Professional headline below name; mirrors JD title
  title_font_size: 10  # pt — Must match CV titles_font_size. Suggested range: 9–11pt
  contact_font_size: 10  # pt — Must match CV contact_font_size. Suggested range: 9–10pt
  links_font_size: 10  # pt — Must match CV links_font_size. Suggested range: 9–10pt
  show_relocation: true  # Must match CV show_relocation. Include for international applicants
  relocation_font_size: 10  # pt — Must match CV relocation_font_size. Suggested range: 9–10pt
  relocation_bold: true  # Must match CV relocation_bold

date:
  alignment: right  # Right-aligned date is the DIN 5008 standard for German business correspondence (Geschäftsbrief). Format: "Berlin, 29. Mai 2026" or "Berlin, 29.05.2026" — city before date is the German norm. Per Tier 1 (DIN 5008), Tier 2 (joblers.net)

body:
  paragraph_spacing_after: 160  # Twips — Suggested range: 120–200 twips (≈6–10pt). DIN 5008: full blank line between paragraphs (block format, no indentation). 160 twips ≈ 8pt. Per Tier 1 (DIN 5008)

# SIGN-OFF — DIN 5008: closing phrase, 2-3 blank lines (for handwritten/digital signature), typed full name
# German sign-off options by formality level:
#   "Mit freundlichen Grüßen," — standard formal close for all sectors (German)
#   "Mit herzlichen Grüßen," — slightly warmer; tech/startup roles (German)
#   "Hochachtungsvoll," — most formal; banking, legal, government (German only)
#   "Kind regards," — English equivalent; use when writing in English
#   "With warm regards," — slightly warmer English close
sign_off:
  closing_text: "Mit freundlichen Grüßen,"  # Default: German formal standard. Alternatives: "Kind regards," (English), "Mit herzlichen Grüßen," (warmer German for tech), "Hochachtungsvoll," (banking/legal only). Per DIN 5008, Tier 2 (liveingermany.de, simplegermany.com)
  name_bold: true
  name_color: "#2E4057"  # Must match CV primary color

typography:
  heading_font: Arial  # Must match CV heading_font. German standard: Arial (DIN 5008 referenced), Calibri (modern), Times New Roman (formal). Popular alternatives: Arial, Calibri, Helvetica, Cambria, Times New Roman
  body_font: Arial  # Must match CV body_font. Arial is the German safest default; Calibri for modern/tech roles
  body_size: 11  # pt — Must match CV body_size. Suggested range: 10–12pt. DIN 5008 minimum 10pt; 11pt is the German practical standard
  line_spacing: 1.15  # Must match CV line_spacing. Suggested range: 1.0–1.15. DIN 5008 cover letters often use 1.0 (single-spaced with paragraph breaks); 1.15 improves readability

colors:
  primary: "#2E4057"  # Must match CV primary color. Suggested: "#2E4057" (muted slate), "#003366" (navy), "#4682B4" (steel blue), "#000000" (black for finance/law)
  body: "#000000"  # Body text always black
  link: "#2E4057"  # Must match CV link color

# Validation limits for validate_output.py
validation:
  min_paragraphs: 4  # Suggested range: 3–5. German Anschreiben standard: 4–5 paragraphs. Minimum 4 ensures proper structure (hook + fit + company + close). Per Tier 2 (liveingermany.de, simplegermany.com)
  max_paragraphs: 5  # Suggested range: 4–6. One page maximum A4; 5 paragraphs is the German standard ceiling. Per Tier 2 (iamexpat.de, expatrio.com)
  min_total_words: 250  # Suggested range: 200–300. German Anschreiben target: 250–400 words. Must fit on one A4 page. Per Tier 2 (liveingermany.de, novoresume.com)
  max_total_words: 400  # Suggested range: 350–450. One A4 page at 11pt with DIN 5008 margins holds approximately 400 words. Per Tier 2 (liveingermany.de, gluckglobal.com)
