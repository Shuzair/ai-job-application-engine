# JSON Schema (in YAML) for cl-data.yaml — France Style
# Validates structured cover letter data produced by the cl-agent.
# Each style has its own complete schema. No inheritance.

type: object
required: [header, date, salutation, paragraphs, sign_off]
additionalProperties: false

properties:
  header:
    type: object
    required: [name, email]
    additionalProperties: false
    properties:
      name:
        type: string
      title:
        type: string
        description: "Candidate's current/target role title for the header"
      email:
        type: string
        format: email
      phone:
        type: string
      linkedin:
        type: string
      github:
        type: string
      relocation:
        type: string

  date:
    type: string
    description: "Letter date — format: 'DD Month YYYY' for French (e.g. '24 mai 2026') or 'Month DD, YYYY' for English (e.g. 'May 24, 2026')"

  salutation:
    type: string
    description: "French: 'Madame, Monsieur,' — English: 'Dear Hiring Team,' or 'Dear [Name],'"

  paragraphs:
    type: array
    items: { type: string }
    minItems: 3
    maxItems: 5
    description: "Body paragraphs following Vous/Moi/Nous structure (3-4 paragraphs standard)"

  sign_off:
    type: object
    required: [closing, name]
    additionalProperties: false
    properties:
      closing:
        type: string
        description: "French: 'Cordialement,' — English: 'Kind regards,'"
      name:
        type: string
      title:
        type: string
      email:
        type: string
      phone:
        type: string
