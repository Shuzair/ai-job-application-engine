# JSON Schema (in YAML) for cv-data.yaml — Saudi Arabia Style
# Validates structured CV data produced by the cv-agent.
# Each style has its own complete schema. No inheritance.

type: object
required: [header, summary, skills, experience, education]
additionalProperties:
  type: array
  items:
    type: string

properties:
  header:
    type: object
    required: [name, email]
    additionalProperties: false
    properties:
      name:
        type: string
        description: Full name of the candidate
      titles:
        type: array
        items: { type: string }
        description: "Role titles/professional headline, e.g. ['Senior Data Engineer']"
      location:
        type: string
        description: "City and country, e.g. 'Riyadh, Saudi Arabia' or 'London, UK'"
      email:
        type: string
        format: email
      phone:
        type: string
        description: "Include +966 country code if in Saudi Arabia, e.g. '+966 5X XXX XXXX'"
      linkedin:
        type: string
      github:
        type: string
        description: "GitHub URL — for tech roles, more important than degree per Saudi hiring norms"
      relocation:
        type: string
        description: "Iqama/visa statement for expats, e.g. 'Iqama: Transferable — valid 04/2027' or 'Open to relocation — employment visa sponsorship required'"
      photo_path:
        type: string
        description: "Path to professional headshot photo. Photos are expected for most Saudi Arabia roles — formal attire, neutral background, passport-style"
      nationality:
        type: string
        description: "Nationality — expected/practical necessity due to Nitaqat/Saudization compliance. Saudi nationals: 'Saudi National'. Expats: state nationality with residency status"
      date_of_birth:
        type: string
        description: "Date of birth in DD/MM/YYYY format — expected in Saudi CVs. Include for all applications"
      marital_status:
        type: string
        description: "Marital status — expected in Saudi Arabia. Options: Single, Married, Divorced. Being married with dependents signals stability for expat hires"

  summary:
    type: string
    description: Professional summary paragraph (3-5 lines). Reference Vision 2030 alignment where genuinely applicable.

  skills:
    type: array
    minItems: 1
    items:
      type: object
      required: [category, items]
      additionalProperties: false
      properties:
        category:
          type: string
          description: "Skill category name. Saudi market buckets: 'Technical Skills', 'Programming Languages', 'Frameworks & Libraries', 'Cloud & DevOps', 'Databases', 'Software & Tools', 'Cybersecurity'"
        items:
          type: array
          minItems: 1
          items: { type: string }

  languages:
    type: array
    items:
      type: object
      required: [language, level]
      additionalProperties: false
      properties:
        language:
          type: string
        level:
          type: string
          description: "Self-descriptive level: Native, Fluent, Professional Working Proficiency, Conversational, Basic. Arabic should always be listed even at basic level. Note MSA vs Gulf Arabic if relevant."

  experience:
    type: array
    minItems: 1
    items:
      type: object
      required: [title, company, date_start, date_end, bullets]
      additionalProperties: false
      properties:
        title:
          type: string
        company:
          type: string
        hq:
          type: string
          description: "Company HQ location, e.g. 'Dhahran, Saudi Arabia'"
        location:
          type: string
          description: "Candidate's working location"
        work_model:
          type: string
          enum: ["", Remote, On-site, Hybrid]
        company_description:
          type: string
          description: "One-line factual company descriptor. Omit for globally known brands (Aramco, SABIC, McKinsey)"
        date_start:
          type: string
          description: "Format: Mon YYYY (3-letter month, Gregorian calendar only, e.g. 'Sep 2024'). Do not use Hijri calendar"
        date_end:
          type: string
          description: "Format: Mon YYYY (e.g. 'Mar 2026') or 'Present'. Gregorian calendar only"
        bullets:
          type: array
          minItems: 1
          items: { type: string }

  education:
    type: array
    minItems: 1
    items:
      type: object
      required: [degree, institution]
      additionalProperties: false
      properties:
        degree:
          type: string
        institution:
          type: string
        location:
          type: string
        date_start:
          type: string
        date_end:
          type: string
        status:
          type: string
          description: "e.g. 'In Progress' — only if applicable"
        gpa:
          type: string
          description: "Include if 3.5/5.0 or higher (Saudi universities use 5.0 scale; KFUPM uses 4.0). State scale explicitly, e.g. '4.5/5.0'. For internationally ranked institutions, optionally add QS rank"

  certifications:
    type: array
    items:
      type: object
      required: [name, issuer, date]
      additionalProperties: false
      properties:
        name:
          type: string
        issuer:
          type: string
        date:
          type: string
          description: "Month and year, e.g. 'April 2026'"
        url:
          type: string
          format: uri
          description: "Verification URL — omit if not available"

  interests:
    type: array
    items: { type: string }
    description: "Optional section. Community and volunteer activities are positively viewed in Saudi Arabia. Keep brief — include only if relevant or demonstrates community engagement"
