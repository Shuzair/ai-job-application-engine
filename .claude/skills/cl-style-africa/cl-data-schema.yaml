# JSON Schema (in YAML) for cl-data.yaml — Africa Style
# Validates structured cover letter data produced by the cl-agent.
# Each style has its own complete schema. No inheritance.
# Covers English-language African markets: South Africa, Nigeria, Kenya, Ghana, Rwanda, Ethiopia.

type: object
required: [header, date, salutation, paragraphs, sign_off]
additionalProperties: false

properties:
  header:
    type: object
    required: [name, email]
    additionalProperties: false
    properties:
      name:
        type: string
      title:
        type: string
        description: "Candidate's current/target role title for the header"
      email:
        type: string
        format: email
      phone:
        type: string
      linkedin:
        type: string
      github:
        type: string
      relocation:
        type: string
        description: "Relocation note — include if applying cross-border"

  date:
    type: string
    description: "Letter date in British format: '5 September 2025' — day (no ordinal), full month name, year. No abbreviations."

  salutation:
    type: string
    description: "Named contact: 'Dear Ms Naidoo,' or 'Dear Mr Okonkwo,' — surname with title. Unknown: 'Dear Hiring Manager,' (preferred). Government/traditional: 'Dear Sir/Madam,' (acceptable). Never: 'To Whom It May Concern'"

  paragraphs:
    type: array
    items: { type: string }
    minItems: 4
    maxItems: 4
    description: "Exactly 4 paragraphs: (1) opening/hook, (2) why I'm a fit with metrics, (3) why this company, (4) closing call-to-action. 300–400 words total. British English spelling."

  sign_off:
    type: object
    required: [closing, name]
    additionalProperties: false
    properties:
      closing:
        type: string
        description: "Closing phrase: 'Kind regards,' (modern, pan-African), 'Yours sincerely,' (named addressee — British convention), 'Yours faithfully,' (unnamed addressee — SA convention), 'Best regards,' (Nigeria/Kenya corporate)"
      name:
        type: string
      title:
        type: string
      email:
        type: string
      phone:
        type: string
