# Cover Letter Format Configuration — Africa Style
# Controls all visual/layout aspects of the rendered cover letter.
# Each style has its own complete format config. No inheritance.
# Designed to visually match the CV (same header, fonts, colors).
# Baseline covers English-language African markets: South Africa, Nigeria, Kenya, Ghana, Rwanda, Ethiopia.

page:
  size: A4  # Must match CV — A4 is universal across all African markets.
  margins:
    top: 2.0  # cm — Must match CV. Suggested range: 2.0–2.5cm. UCT and SA guide standard.
    bottom: 2.0  # cm — Must match CV. Suggested range: 2.0–2.5cm.
    left: 2.0  # cm — Must match CV. Suggested range: 2.0–2.5cm.
    right: 2.0  # cm — Must match CV. Suggested range: 1.5–2.0cm.

header:
  name_font_size: 18  # pt — Must match CV name_font_size. Suggested range: 16–22pt.
  name_color: "#003366"  # Must match CV primary color — deep navy for visual consistency. Alternatives: "#1A5276", "#2C3E50", "#7B241C"
  name_case: upper  # Must match CV name_case. Options: upper, title, as-is
  name_bold: true  # Must match CV name_bold. Options: true, false
  show_title: true  # Must match CV show_titles. Options: true, false
  title_font_size: 10  # pt — Must match CV titles_font_size. Suggested range: 9–11pt.
  contact_font_size: 10  # pt — Must match CV contact_font_size. Suggested range: 9–10pt.
  links_font_size: 10  # pt — Must match CV links_font_size. Suggested range: 9–10pt.
  show_relocation: true  # Must match CV show_relocation. Options: true, false
  relocation_font_size: 10  # pt — Must match CV relocation_font_size. Suggested range: 9–10pt.
  relocation_bold: true  # Must match CV relocation_bold. Options: true, false

date:
  alignment: left  # Left-aligned per British business letter convention — standard across SA, Nigeria, Kenya, Ghana. Date format: "5 September 2025" (day, full month name, year — no ordinal suffix, no abbreviated month). Options: left, right

body:
  paragraph_spacing_after: 120  # twips — Suggested range: 100–160 twips (≈5–8pt). 120 twips (6pt) is standard paragraph spacing for British-format business letters used across African markets.

sign_off:
  closing_text: "Kind regards,"  # Modern pan-African standard. Options by convention: "Yours sincerely," (named addressee — British convention, used in SA/Nigeria/Kenya), "Yours faithfully," (unnamed addressee — South African business letter rule), "Best regards," (Nigeria/Kenya informal corporate). "Kind regards," is acceptable in all markets.
  name_bold: true
  name_color: "#003366"  # Must match CV primary color

typography:
  heading_font: Calibri  # Must match CV heading_font. Alternatives: Arial, Times New Roman (traditional/government), Georgia, Cambria
  body_font: Calibri  # Must match CV body_font. Alternatives: Arial, Times New Roman
  body_size: 11  # pt — Must match CV body_size. Suggested range: 10–12pt. 11pt recommended by CVJury SA, AtomCareer Kenya, Resumeble Nigeria.
  line_spacing: 1.15  # Must match CV line_spacing. Suggested range: 1.0–1.15.

colors:
  primary: "#003366"  # Must match CV primary color — deep navy. Alternatives: "#1A5276" (dark teal), "#2C3E50" (charcoal), "#7B241C" (burgundy)
  body: "#000000"
  link: "#003366"

# Validation limits for validate_output.py
validation:
  min_paragraphs: 4  # 4-paragraph structure is standard across SA, Nigeria, Kenya: intro + fit + company + close. Per UCT, CVJury, Jobberman.
  max_paragraphs: 4  # Keep to 4 paragraphs — more than 4 risks exceeding one page.
  min_total_words: 250  # Suggested range: 250–300. Nigerian guides say 250–400; SA guides say half to one full page.
  max_total_words: 400  # Suggested range: 350–450. One A4 page maximum. Robert Walters Africa recommends concise letters.
