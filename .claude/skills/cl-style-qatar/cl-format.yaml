# Cover Letter Format Configuration — Qatar Style
# Controls all visual/layout aspects of the rendered cover letter.
# Each style has its own complete format config. No inheritance.
# Designed to visually match the CV (same header, fonts, colors).

page:
  size: A4  # GCC universal standard — must match CV. A4 (210×297mm). No Gulf source recommends Letter size.
  margins:
    top: 2.0  # cm — Suggested range: 2.0–2.5cm. Must match CV top margin. MenaJobs recommends 2–2.5cm
    bottom: 2.0  # cm — Suggested range: 2.0–2.5cm. Must match CV bottom margin
    left: 2.0  # cm — Suggested range: 2.0–2.5cm. Must match CV left margin
    right: 2.0  # cm — Suggested range: 1.5–2.0cm. Must match CV right margin

header:
  name_font_size: 18  # pt — Must match CV name_font_size. Suggested range: 16–22pt. 18pt is the Qatar midpoint
  name_color: "#8D1B3D"  # Must match CV primary color — Qatar maroon. Alternatives: "#1F3864" (dark navy), "#2C3E50" (charcoal blue), "#000000" (black)
  name_case: upper  # Must match CV name_case. Options: upper, title, as-is
  name_bold: true  # Must match CV name_bold
  show_title: true  # Must match CV show_titles. Options: true, false
  title_font_size: 10  # pt — Must match CV titles_font_size. Suggested range: 9–11pt
  contact_font_size: 10  # pt — Must match CV contact_font_size. Suggested range: 9–10pt
  links_font_size: 10  # pt — Must match CV links_font_size. Suggested range: 9–10pt
  show_relocation: true  # Must match CV show_relocation. QID status and relocation notices are expected in Qatar
  relocation_font_size: 10  # pt — Must match CV relocation_font_size. Suggested range: 9–10pt
  relocation_bold: true  # Must match CV relocation_bold

date:
  alignment: right  # British business letter convention — date is right-aligned. Options: left, right. Format: DD Month YYYY (e.g., "2 June 2026")

body:
  paragraph_spacing_after: 120  # twips — Suggested range: 100–160 twips (≈5–8pt). 120 twips (≈6pt) provides clear paragraph separation in formal Gulf business letters without excessive whitespace

# Qatar sign-off conventions — research-backed options:
# Named recipient:     "Yours sincerely,"
# Unnamed recipient:   "Yours faithfully,"
# Multinational:       "Best regards," or "Respectfully yours,"
# Arabic letter:       "مع خالص التحية والتقدير" (With sincere regards and respect)
sign_off:
  closing_text: "Yours sincerely,"  # Alternatives: "Yours faithfully," (unnamed recipient), "Best regards," (multinational/QFC), "Respectfully yours," (formal/government)
  name_bold: true
  name_color: "#8D1B3D"  # Must match CV primary color — Qatar maroon. Alternatives: "#1F3864" (dark navy), "#000000" (black)

typography:
  heading_font: Calibri  # Must match CV heading_font. Popular in Qatar/GCC: Calibri (recommended), Arial, Garamond, Open Sans, Helvetica
  body_font: Calibri  # Must match CV body_font
  body_size: 11  # pt — Must match CV body_size. Suggested range: 10–12pt. 11pt is the Qatar consensus (MenaJobs 10–12pt, ResumeFlex 11–12pt)
  line_spacing: 1.15  # Must match CV line_spacing. Suggested range: 1.0–1.5. ResumeFlex recommends 1.15 or 1.5 for Gulf documents

colors:
  primary: "#8D1B3D"  # Must match CV primary color — Qatar maroon. Alternatives: "#1F3864" (dark navy), "#2C3E50" (charcoal blue)
  body: "#000000"  # Body text — always black
  link: "#8D1B3D"  # Must match CV link color — Qatar maroon

# Validation limits for validate_output.py
validation:
  min_paragraphs: 3  # Suggested range: 3–4. Qatar cover letters: 3 paragraphs minimum (opening, body, close). Expatica and ResumeFlex confirm 3–4 paragraphs
  max_paragraphs: 4  # Suggested range: 4–6. Qatar: 3–4 paragraphs total. 4 is the ceiling — Expatica states "not longer than one page"
  min_total_words: 250  # Suggested range: 200–300. Qatar cover letters should be substantive but concise. 250 words is the floor for genuine content
  max_total_words: 400  # Suggested range: 350–500. One-page maximum is the explicit Qatar norm (Expatica). 400 words fits one page at 11pt with standard margins
