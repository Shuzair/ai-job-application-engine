# JSON Schema (in YAML) for cv-data.yaml — USA Style
# Validates structured CV data produced by the cv-agent.
# Each style has its own complete schema. No inheritance.
# NOTE: Photo, DOB, nationality, marital status excluded — illegal under US EEO/ADA/ADEA laws.

type: object
required: [header, summary, skills, experience, education]
additionalProperties:
  type: array
  items:
    type: string

properties:
  header:
    type: object
    required: [name, email]
    additionalProperties: false
    properties:
      name:
        type: string
        description: Full name of the candidate
      titles:
        type: array
        items: { type: string }
        description: "Role titles, e.g. ['Senior Data Engineer', 'Analytics Engineer']"
      location:
        type: string
        description: "City and State only — e.g. 'Austin, TX' or 'San Francisco, CA'. Never full street address."
      email:
        type: string
        format: email
      phone:
        type: string
      linkedin:
        type: string
      github:
        type: string
      work_authorization:
        type: string
        description: "Optional — e.g. 'Authorized to work in the US without sponsorship'. Include only if relevant."
      relocation:
        type: string
        description: "Relocation statement, e.g. 'Open to relocation to San Francisco, CA'"

  summary:
    type: string
    description: Professional summary paragraph (3-4 sentences, 40-80 words). Direct, quantified, no buzzwords.

  skills:
    type: array
    minItems: 1
    items:
      type: object
      required: [category, items]
      additionalProperties: false
      properties:
        category:
          type: string
          description: "Skill category, e.g. 'Programming & Scripting', 'Cloud Platforms', 'Data Engineering & Warehousing'"
        items:
          type: array
          minItems: 1
          items: { type: string }

  languages:
    type: array
    items:
      type: object
      required: [language, level]
      additionalProperties: false
      properties:
        language:
          type: string
        level:
          type: string
          description: "US proficiency scale: Native, Fluent, Professional Working Proficiency, Conversational, Basic. NOT CEFR."

  experience:
    type: array
    minItems: 1
    items:
      type: object
      required: [title, company, date_start, date_end, bullets]
      additionalProperties: false
      properties:
        title:
          type: string
        company:
          type: string
        hq:
          type: string
          description: "Company HQ location, e.g. 'San Francisco, CA'"
        location:
          type: string
          description: "Candidate's working location, e.g. 'Remote — Austin, TX'"
        work_model:
          type: string
          enum: ["", Remote, On-site, Hybrid]
        company_description:
          type: string
          description: "One-line factual company descriptor. Omit for FAANG/widely-known companies."
        date_start:
          type: string
          description: "Format: Mon YYYY (3-letter month, e.g. Jan 2022)"
        date_end:
          type: string
          description: "Format: Mon YYYY (e.g. Mar 2024) or 'Present'"
        bullets:
          type: array
          minItems: 1
          items: { type: string }
          description: "Action verb + what you did + quantified impact. Past tense (current role: present tense)."

  projects:
    type: array
    items:
      type: object
      required: [name, description, bullets]
      additionalProperties: false
      properties:
        name:
          type: string
          description: "Project name"
        description:
          type: string
          description: "One-line description of what the project is/does"
        url:
          type: string
          description: "GitHub or live URL — include if available"
        bullets:
          type: array
          minItems: 1
          maxItems: 2
          items: { type: string }
          description: "1-2 bullets: what was built, what tech was used, what impact"

  education:
    type: array
    minItems: 1
    items:
      type: object
      required: [degree, institution]
      additionalProperties: false
      properties:
        degree:
          type: string
          description: "e.g. 'Bachelor of Science in Computer Science' or 'B.S., Computer Science'"
        institution:
          type: string
        location:
          type: string
          description: "City, State — e.g. 'Austin, TX'"
        date_start:
          type: string
        date_end:
          type: string
          description: "Graduation year only (e.g. '2020') or 'Expected May 2026' for in-progress"
        status:
          type: string
          description: "e.g. 'In Progress' — only if applicable"
        gpa:
          type: string
          description: "Include only if 3.5+ and graduated within last 5 years, e.g. 'GPA: 3.8/4.0'"

  certifications:
    type: array
    items:
      type: object
      required: [name, issuer, date]
      additionalProperties: false
      properties:
        name:
          type: string
        issuer:
          type: string
        date:
          type: string
          description: "Month and year, e.g. 'Mar 2024'"
        url:
          type: string
          format: uri
          description: "Verification URL — include for AWS, GCP, Azure certs"
