# JSON Schema (in YAML) for cv-data.yaml — Germany Style (Lebenslauf)
# Validates structured CV data produced by the cv-agent.
# Each style has its own complete schema. No inheritance.

type: object
required: [header, summary, skills, experience, education]
additionalProperties:
  type: array
  items:
    type: string

properties:
  header:
    type: object
    required: [name, email]
    additionalProperties: false
    properties:
      name:
        type: string
        description: Full name of the candidate
      titles:
        type: array
        items: { type: string }
        description: "Role titles, e.g. ['Analytics Engineer', 'Data Engineer']"
      location:
        type: string
        description: Current city and country
      email:
        type: string
        format: email
      phone:
        type: string
      linkedin:
        type: string
      github:
        type: string
      xing:
        type: string
        description: "XING profile URL — relevant for German market, especially traditional sectors"
      photo_path:
        type: string
        description: "Path to professional headshot (Bewerbungsfoto). Expected by ~82% of German recruiters. Placed top-right corner."
      date_of_birth:
        type: string
        description: "Date of birth in DD.MM.YYYY format, e.g. '15.03.1990'. Still expected by most German employers (Geburtsdatum)"
      place_of_birth:
        type: string
        description: "City of birth (Geburtsort), e.g. 'Karachi'. Listed alongside date of birth in German CVs"
      nationality:
        type: string
        description: "Nationality (Staatsangehörigkeit), e.g. 'Pakistani'. Important for non-EU applicants for work permit assessment"
      relocation:
        type: string
        description: "Relocation statement, e.g. 'Open to immediate relocation to Germany' or 'Currently based in Lahore, Pakistan — available for relocation'"

  summary:
    type: string
    description: Professional summary paragraph (3-5 lines)

  skills:
    type: array
    minItems: 1
    items:
      type: object
      required: [category, items]
      additionalProperties: false
      properties:
        category:
          type: string
          description: "Skill category name, e.g. 'Programming & Scripting'"
        items:
          type: array
          minItems: 1
          items: { type: string }

  languages:
    type: array
    items:
      type: object
      required: [language, level]
      additionalProperties: false
      properties:
        language:
          type: string
        level:
          type: string
          description: "CEFR level or 'Native', e.g. 'C1 (IELTS 7.0)'"

  experience:
    type: array
    minItems: 1
    items:
      type: object
      required: [title, company, date_start, date_end, bullets]
      additionalProperties: false
      properties:
        title:
          type: string
        company:
          type: string
        hq:
          type: string
          description: "Company HQ location, e.g. 'San Francisco, USA'"
        location:
          type: string
          description: "Candidate's working location"
        work_model:
          type: string
          enum: ["", Remote, On-site, Hybrid]
        company_description:
          type: string
          description: One-line factual company descriptor
        date_start:
          type: string
          description: "Format: Mon YYYY (3-letter month, e.g. Sep 2024)"
        date_end:
          type: string
          description: "Format: Mon YYYY (3-letter month, e.g. Sep 2024) or 'Present'"
        bullets:
          type: array
          minItems: 1
          items: { type: string }

  education:
    type: array
    minItems: 1
    items:
      type: object
      required: [degree, institution]
      additionalProperties: false
      properties:
        degree:
          type: string
        institution:
          type: string
        location:
          type: string
        date_start:
          type: string
        date_end:
          type: string
        status:
          type: string
          description: "e.g. 'In Progress' — only if applicable"
        gpa:
          type: string

  certifications:
    type: array
    items:
      type: object
      required: [name, issuer, date]
      additionalProperties: false
      properties:
        name:
          type: string
        issuer:
          type: string
        date:
          type: string
          description: "Month and year, e.g. 'April 2026'"
        url:
          type: string
          format: uri
          description: "Verification URL — omit if not available"

  interests:
    type: array
    items: { type: string }
    description: "3–5 interests/hobbies for the Interessen section. German employers expect this section (Persönlichkeit). Active hobbies, open source, music, volunteering. Avoid generic items like 'travel' or 'watching TV'."
