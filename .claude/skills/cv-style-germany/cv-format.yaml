# CV Format Configuration — Germany Style
# Controls all visual/layout aspects of the rendered CV document.
# Each style has its own complete format config. No inheritance.
# The rendering script (scripts/render.py) reads this file deterministically.
# References: DIN 5008, StepStone.de, Bundesagentur für Arbeit, Fintiba, NovoResume

page:
  size: A4  # Germany uses A4 exclusively (210×297mm). Options: A4, Letter
  margins:
    top: 1.5  # cm — Per DIN 5008 Form A. Suggested range: 2.0–2.7cm
    bottom: 1.5  # cm — Suggested range: 1.5–2.0cm. No DIN lower bound specified
    left: 1.5  # cm — Per DIN 5008 standard (25mm). Wider left margin accommodates binding/folder punches
    right: 1.5  # cm — Per DIN 5008 standard (20mm). Suggested range: 1.5–2.0cm

header:
  name_font_size: 16  # pt — Suggested range: 18–24pt. Must be the largest element on the page
  name_color: "#003366"  # Navy blue — most popular in Germany; conveys trustworthiness. Popular: #003366 (navy), #005F73 (dark teal), #36454F (charcoal), #4A6FA5 (slate blue)
  name_case: upper  # German convention accepts uppercase. Options: upper, title, as-is. Some templates use uppercase surname only (e.g., "Max MÜLLER")
  name_bold: true  # Universally standard in Germany. Options: true, false
  show_titles: true  # Professional headline (Berufsbezeichnung) below name is increasingly standard. Options: true, false
  titles_font_size: 9  # pt — Suggested range: 9–11pt. Secondary text, smaller than name
  contact_font_size: 9  # pt — Suggested range: 9–10pt. Standard secondary text
  links_font_size: 9  # pt — Suggested range: 9–10pt. LinkedIn preferred over XING in 2025-2026
  show_relocation: false  # Relocation statements expected when applying from abroad. Options: true, false
  relocation_font_size: 9  # pt — Suggested range: 9–10pt. Matches contact/links size
  relocation_bold: true  # Bold draws attention to availability/relocation readiness. Options: true, false
  photo:
    enabled: false  # Photos expected in Germany despite AGG (2006). ~82% of recruiters expect one. Options: true, false
    width_cm: 4.5  # cm — Standard German Bewerbungsfoto: 4.5×6cm passport-style
    height_cm: 6.0  # cm — Professional studio shot, head and shoulders, neutral background
    position: top-right  # Placement: top-right corner of page 1. Options: top-right, top-left

# Sections — customized for German Lebenslauf conventions
# German heading equivalents shown as inline comments
sections:
  order:
    - summary
    - skills
    - certifications
    - experience
    - education
    - languages
    - interests
  headings:
    summary: "Professional Summary"  # Profil / Kurzprofil
    skills: "Skills"  # Kenntnisse / Fähigkeiten / IT-Kenntnisse
    experience: "Professional Experience"  # Berufserfahrung / Beruflicher Werdegang
    education: "Education"  # Ausbildung / Bildungsweg
    certifications: "Certifications"  # Zertifikate / Weiterbildungen
    languages: "Languages"  # Sprachkenntnisse
    interests: "Interests"  # Hobbys / Interessen
  heading_case: upper  # German CVs commonly use uppercase headings. Options: upper, title, as-is
  heading_bold: true  # Always bold in Germany. Options: true, false
  heading_underline: true  # Thin horizontal rule below heading is very common in German templates. Options: true, false
  heading_size: 11  # pt — Suggested range: 11–14pt. Clearly larger than body, smaller than name
  section_types:
    interests: list  # Interests displayed as bullet points

typography:
  heading_font: Calibri  # Sans-serif preferred in Germany. Popular: Calibri, Arial, Helvetica, Roboto, Garamond (serif for traditional/academic)
  body_font: Calibri  # Must match or pair with heading font. Popular: Calibri, Arial, Helvetica, Roboto
  body_size: 10  # pt — German standard: 11pt. Suggested range: 10–12pt. Never below 10pt (recruiters print CVs)
  line_spacing: 1.05  # German standard for body text. Suggested range: 1.05–1.15. Avoid 1.0 (cramped) or 1.5 (wastes space)

skills:
  separator: " | "  # Middle dot is standard in German CVs. Options: " · " (middle dot), " | " (pipe), ", " (comma)

languages:
  separator: " | "  # Matches skills separator for visual consistency

experience:
  show_company_description: true  # Brief descriptor for lesser-known companies is standard. Options: true, false
  max_bullets_per_role: 5  # German convention: 4–5 bullets for recent roles. Suggested range: 4–6

colors:
  primary: "#003366"  # Navy blue — conservative German market preference. Popular: #003366 (navy), #005F73 (dark teal), #36454F (charcoal), #4A6FA5 (slate blue)
  body: "#000000"  # Black body text on white background — universal German standard
  link: "#003366"  # Matches primary for visual consistency

# Validation limits for validate_output.py
validation:
  summary_min_words: 40  # Suggested range: 30–50. German Kurzprofil: 2–4 factual sentences
  summary_max_words: 100  # Suggested range: 80–120. Keep brief and factual — not promotional
  max_bullet_words: 20  # Suggested range: 15–25. German bullets: 1–2 lines, precise and quantified
  max_bullets_recent: 5  # Suggested range: 4–5. Recent roles get most detail
  max_bullets_old: 3  # Suggested range: 2–3. Older roles condensed; sometimes one-line summary
  max_pages: 2  # German Lebenslauf: strictly 1–2 pages. Options: 1, 2, 3
