# Cover Letter Format Configuration — Pakistan Style
# Controls all visual/layout aspects of the rendered cover letter.
# Each style has its own complete format config. No inheritance.
# Designed to visually match the CV (same header, fonts, colors).
#
# Pakistan context: formal British-style letter format. English is the
# professional standard. Sources: ilm.com.pk, pakjobbazar.com (Tier 2).

page:
  size: A4  # Must match CV — A4 is the universal standard in Pakistan.
  margins:
    top: 2.54  # cm — Must match CV top margin. Suggested range: 2.0–2.54cm.
    bottom: 2.54  # cm — Must match CV. Suggested range: 2.0–2.54cm.
    left: 2.54  # cm — Must match CV. Suggested range: 2.0–2.54cm.
    right: 2.0  # cm — Must match CV. Suggested range: 1.5–2.54cm.

header:
  name_font_size: 16  # pt — Must match CV name_font_size. Suggested range: 14–20pt.
  name_color: "#1A1A1A"  # Must match CV primary color. Traditional: "#1A1A1A" (near-black). Modern/tech: "#2E74B5" (steel blue).
  name_case: title  # Must match CV name_case. Options: upper, title, as-is.
  name_bold: true  # Must match CV name_bold.
  show_title: true  # Must match CV show_titles. Options: true, false.
  title_font_size: 10  # pt — Must match CV titles_font_size. Suggested range: 9–11pt.
  contact_font_size: 10  # pt — Must match CV contact_font_size. Suggested range: 9–10pt.
  links_font_size: 10  # pt — Must match CV links_font_size. Suggested range: 9–10pt.
  show_relocation: true  # Must match CV show_relocation.
  relocation_font_size: 10  # pt — Must match CV relocation_font_size.
  relocation_bold: true  # Must match CV relocation_bold.

date:
  alignment: left  # left — Pakistan follows British formal letter convention: date at top-left, below sender address. Options: left, right.

body:
  paragraph_spacing_after: 120  # twips — Suggested range: 100–160 twips (≈5–8pt). 120 twips provides comfortable paragraph separation for a formal letter. Source: standard formal letter spacing.

# Pakistan sign-off conventions follow British Commonwealth norms (ilm.com.pk, Tier 2):
#   "Yours sincerely," — when recipient is named (Dear Mr. Khan)
#   "Yours faithfully," — when recipient is unnamed (Dear Hiring Manager / Dear Sir/Madam)
#   "Respectfully yours," — also used in Pakistani formal correspondence
# Default to "Yours sincerely," as the agent will address by name when possible.
sign_off:
  closing_text: "Yours sincerely,"  # British Commonwealth standard for Pakistan. Alternatives: "Yours faithfully," (unnamed recipient), "Respectfully yours," (very formal/government).
  name_bold: true
  name_color: "#1A1A1A"  # Must match CV primary color.

typography:
  heading_font: Calibri  # Must match CV heading_font. Popular in Pakistan: Calibri, Arial, Times New Roman.
  body_font: Calibri  # Must match CV body_font.
  body_size: 11  # pt — Must match CV body_size. Suggested range: 10–12pt.
  line_spacing: 1.15  # Must match CV line_spacing. Suggested range: 1.0–1.15.

colors:
  primary: "#1A1A1A"  # Must match CV primary color for visual consistency. Traditional: "#1A1A1A". Modern/tech: "#2E74B5".
  body: "#000000"
  link: "#2E74B5"  # Must match CV link color.

# Validation limits for validate_output.py
# Pakistan cover letter norms: 3–4 paragraphs, under 350 words (ilm.com.pk, pakjobbazar.com — Tier 2)
validation:
  min_paragraphs: 3   # Suggested range: 3–4. Minimum 3: hook + fit + close.
  max_paragraphs: 4   # Suggested range: 3–5. 4 paragraphs is the standard (hook + fit + why-company + close).
  min_total_words: 180  # Suggested range: 150–250. ilm.com.pk recommends ~150 words; slightly more for experienced candidates.
  max_total_words: 350  # Suggested range: 300–400. All Pakistan sources suggest under 1 page; 350 words is a firm ceiling.
