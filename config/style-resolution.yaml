# Style Resolution Configuration
# Maps countries to regions for automatic style skill selection.
#
# Resolution order (first match wins):
#   1. Explicit Style field in input.md → cv-style-{value} / cl-style-{value}
#   2. Country from Location → cv-style-{country} / cl-style-{country}
#   3. Region lookup → cv-style-{region} / cl-style-{region}
#   4. Default → cv-style-default / cl-style-default
#
# Each style skill is a COMPLETE, self-contained set of rules.
# Only one CV style and one CL style is loaded per application.
#
# Naming convention:
#   CV styles: cv-style-{identifier}  (skill folder: .claude/skills/cv-style-{identifier}/)
#   CL styles: cl-style-{identifier}  (skill folder: .claude/skills/cl-style-{identifier}/)
